services:
  scholar-search-mcp:
    build:
      context: .
    image: scholar-search-mcp:local
    command: ["deployment-http"]
    ports:
      - "${SCHOLAR_SEARCH_PUBLISHED_HOST:-127.0.0.1}:${SCHOLAR_SEARCH_PUBLISHED_PORT:-8000}:8080"
    environment:
      # Optional local overrides. User-facing transport and path stay
      # configurable here; the image keeps the container bind host and internal
      # port fixed at 0.0.0.0:8080.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      OPENALEX_MAILTO: ${OPENALEX_MAILTO:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      CROSSREF_MAILTO: ${CROSSREF_MAILTO:-}
      UNPAYWALL_EMAIL: ${UNPAYWALL_EMAIL:-}
      SCHOLAR_SEARCH_ENABLE_CORE: ${SCHOLAR_SEARCH_ENABLE_CORE:-true}
      SCHOLAR_SEARCH_ENABLE_SEMANTIC_SCHOLAR: ${SCHOLAR_SEARCH_ENABLE_SEMANTIC_SCHOLAR:-true}
      SCHOLAR_SEARCH_ENABLE_OPENALEX: ${SCHOLAR_SEARCH_ENABLE_OPENALEX:-true}
      SCHOLAR_SEARCH_ENABLE_ARXIV: ${SCHOLAR_SEARCH_ENABLE_ARXIV:-true}
      SCHOLAR_SEARCH_ENABLE_SERPAPI: ${SCHOLAR_SEARCH_ENABLE_SERPAPI:-false}
      SCHOLAR_SEARCH_ENABLE_CROSSREF: ${SCHOLAR_SEARCH_ENABLE_CROSSREF:-true}
      SCHOLAR_SEARCH_ENABLE_UNPAYWALL: ${SCHOLAR_SEARCH_ENABLE_UNPAYWALL:-true}
      SCHOLAR_SEARCH_ENABLE_AGENTIC: ${SCHOLAR_SEARCH_ENABLE_AGENTIC:-false}
      CROSSREF_TIMEOUT_SECONDS: ${CROSSREF_TIMEOUT_SECONDS:-30}
      UNPAYWALL_TIMEOUT_SECONDS: ${UNPAYWALL_TIMEOUT_SECONDS:-30}
      SCHOLAR_SEARCH_PROVIDER_ORDER: ${SCHOLAR_SEARCH_PROVIDER_ORDER:-}
      SCHOLAR_SEARCH_AGENTIC_PROVIDER: ${SCHOLAR_SEARCH_AGENTIC_PROVIDER:-openai}
      SCHOLAR_SEARCH_PLANNER_MODEL: ${SCHOLAR_SEARCH_PLANNER_MODEL:-gpt-5.4-mini}
      SCHOLAR_SEARCH_SYNTHESIS_MODEL: ${SCHOLAR_SEARCH_SYNTHESIS_MODEL:-gpt-5.4}
      SCHOLAR_SEARCH_EMBEDDING_MODEL: ${SCHOLAR_SEARCH_EMBEDDING_MODEL:-text-embedding-3-large}
      SCHOLAR_SEARCH_DISABLE_EMBEDDINGS: ${SCHOLAR_SEARCH_DISABLE_EMBEDDINGS:-false}
      SCHOLAR_SEARCH_AGENTIC_OPENAI_TIMEOUT_SECONDS: ${SCHOLAR_SEARCH_AGENTIC_OPENAI_TIMEOUT_SECONDS:-30}
      SCHOLAR_SEARCH_AGENTIC_INDEX_BACKEND: ${SCHOLAR_SEARCH_AGENTIC_INDEX_BACKEND:-memory}
      SCHOLAR_SEARCH_SESSION_TTL_SECONDS: ${SCHOLAR_SEARCH_SESSION_TTL_SECONDS:-1800}
      SCHOLAR_SEARCH_ENABLE_AGENTIC_TRACE_LOG: ${SCHOLAR_SEARCH_ENABLE_AGENTIC_TRACE_LOG:-false}
      SCHOLAR_SEARCH_TRANSPORT: ${SCHOLAR_SEARCH_TRANSPORT:-streamable-http}
      SCHOLAR_SEARCH_HTTP_PATH: ${SCHOLAR_SEARCH_HTTP_PATH:-/mcp}
      SCHOLAR_SEARCH_HTTP_AUTH_TOKEN: ${SCHOLAR_SEARCH_HTTP_AUTH_TOKEN:-}
      SCHOLAR_SEARCH_HTTP_AUTH_HEADER: ${SCHOLAR_SEARCH_HTTP_AUTH_HEADER:-authorization}
      SCHOLAR_SEARCH_ALLOWED_ORIGINS: ${SCHOLAR_SEARCH_ALLOWED_ORIGINS:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
