services:
  paper-chaser-mcp:
    build:
      context: .
    image: paper-chaser-mcp:local
    command: ["deployment-http"]
    ports:
      - "${PAPER_CHASER_PUBLISHED_HOST:-127.0.0.1}:${PAPER_CHASER_PUBLISHED_PORT:-8000}:8080"
    environment:
      # Optional local overrides. User-facing transport and path stay
      # configurable here; the image keeps the container bind host and internal
      # port fixed at 0.0.0.0:8080.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      HUGGINGFACE_BASE_URL: ${HUGGINGFACE_BASE_URL:-https://router.huggingface.co/v1}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_NIM_BASE_URL: ${NVIDIA_NIM_BASE_URL:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
      AZURE_OPENAI_PLANNER_DEPLOYMENT: ${AZURE_OPENAI_PLANNER_DEPLOYMENT:-}
      AZURE_OPENAI_SYNTHESIS_DEPLOYMENT: ${AZURE_OPENAI_SYNTHESIS_DEPLOYMENT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      OPENALEX_MAILTO: ${OPENALEX_MAILTO:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}
      SCHOLARAPI_API_KEY: ${SCHOLARAPI_API_KEY:-}
      GOVINFO_API_KEY: ${GOVINFO_API_KEY:-}
      CROSSREF_MAILTO: ${CROSSREF_MAILTO:-}
      UNPAYWALL_EMAIL: ${UNPAYWALL_EMAIL:-}
      ECOS_BASE_URL: ${ECOS_BASE_URL:-https://ecos.fws.gov}
      PAPER_CHASER_ENABLE_CORE: ${PAPER_CHASER_ENABLE_CORE:-false}
      PAPER_CHASER_ENABLE_SEMANTIC_SCHOLAR: ${PAPER_CHASER_ENABLE_SEMANTIC_SCHOLAR:-true}
      PAPER_CHASER_ENABLE_OPENALEX: ${PAPER_CHASER_ENABLE_OPENALEX:-true}
      PAPER_CHASER_ENABLE_ARXIV: ${PAPER_CHASER_ENABLE_ARXIV:-true}
      PAPER_CHASER_ENABLE_SERPAPI: ${PAPER_CHASER_ENABLE_SERPAPI:-false}
      PAPER_CHASER_ENABLE_SCHOLARAPI: ${PAPER_CHASER_ENABLE_SCHOLARAPI:-false}
      PAPER_CHASER_ENABLE_CROSSREF: ${PAPER_CHASER_ENABLE_CROSSREF:-true}
      PAPER_CHASER_ENABLE_UNPAYWALL: ${PAPER_CHASER_ENABLE_UNPAYWALL:-true}
      PAPER_CHASER_ENABLE_ECOS: ${PAPER_CHASER_ENABLE_ECOS:-true}
      PAPER_CHASER_ENABLE_FEDERAL_REGISTER: ${PAPER_CHASER_ENABLE_FEDERAL_REGISTER:-true}
      PAPER_CHASER_ENABLE_GOVINFO_CFR: ${PAPER_CHASER_ENABLE_GOVINFO_CFR:-true}
      PAPER_CHASER_ENABLE_AGENTIC: ${PAPER_CHASER_ENABLE_AGENTIC:-false}
      PAPER_CHASER_HIDE_DISABLED_TOOLS: ${PAPER_CHASER_HIDE_DISABLED_TOOLS:-false}
      CROSSREF_TIMEOUT_SECONDS: ${CROSSREF_TIMEOUT_SECONDS:-30}
      UNPAYWALL_TIMEOUT_SECONDS: ${UNPAYWALL_TIMEOUT_SECONDS:-30}
      ECOS_TIMEOUT_SECONDS: ${ECOS_TIMEOUT_SECONDS:-30}
      FEDERAL_REGISTER_TIMEOUT_SECONDS: ${FEDERAL_REGISTER_TIMEOUT_SECONDS:-30}
      GOVINFO_TIMEOUT_SECONDS: ${GOVINFO_TIMEOUT_SECONDS:-30}
      GOVINFO_DOCUMENT_TIMEOUT_SECONDS: ${GOVINFO_DOCUMENT_TIMEOUT_SECONDS:-60}
      GOVINFO_MAX_DOCUMENT_SIZE_MB: ${GOVINFO_MAX_DOCUMENT_SIZE_MB:-25}
      ECOS_DOCUMENT_TIMEOUT_SECONDS: ${ECOS_DOCUMENT_TIMEOUT_SECONDS:-60}
      ECOS_DOCUMENT_CONVERSION_TIMEOUT_SECONDS: ${ECOS_DOCUMENT_CONVERSION_TIMEOUT_SECONDS:-60}
      ECOS_MAX_DOCUMENT_SIZE_MB: ${ECOS_MAX_DOCUMENT_SIZE_MB:-25}
      ECOS_VERIFY_TLS: ${ECOS_VERIFY_TLS:-true}
      ECOS_CA_BUNDLE: ${ECOS_CA_BUNDLE:-}
      PAPER_CHASER_PROVIDER_ORDER: ${PAPER_CHASER_PROVIDER_ORDER:-}
      # Smart workflow providers: openai, azure-openai, anthropic, nvidia, google, mistral, huggingface, deterministic.
      # Embeddings remain disabled by default.
      PAPER_CHASER_AGENTIC_PROVIDER: ${PAPER_CHASER_AGENTIC_PROVIDER:-openai}
      PAPER_CHASER_PLANNER_MODEL: ${PAPER_CHASER_PLANNER_MODEL:-gpt-5.4-mini}
      PAPER_CHASER_SYNTHESIS_MODEL: ${PAPER_CHASER_SYNTHESIS_MODEL:-gpt-5.4}
      PAPER_CHASER_EMBEDDING_MODEL: ${PAPER_CHASER_EMBEDDING_MODEL:-text-embedding-3-large}
      PAPER_CHASER_DISABLE_EMBEDDINGS: ${PAPER_CHASER_DISABLE_EMBEDDINGS:-true}
      PAPER_CHASER_AGENTIC_OPENAI_TIMEOUT_SECONDS: ${PAPER_CHASER_AGENTIC_OPENAI_TIMEOUT_SECONDS:-30}
      PAPER_CHASER_AGENTIC_INDEX_BACKEND: ${PAPER_CHASER_AGENTIC_INDEX_BACKEND:-memory}
      PAPER_CHASER_SESSION_TTL_SECONDS: ${PAPER_CHASER_SESSION_TTL_SECONDS:-1800}
      PAPER_CHASER_ENABLE_AGENTIC_TRACE_LOG: ${PAPER_CHASER_ENABLE_AGENTIC_TRACE_LOG:-false}
      PAPER_CHASER_GUIDED_RESEARCH_LATENCY_PROFILE: ${PAPER_CHASER_GUIDED_RESEARCH_LATENCY_PROFILE:-deep}
      PAPER_CHASER_GUIDED_FOLLOW_UP_LATENCY_PROFILE: ${PAPER_CHASER_GUIDED_FOLLOW_UP_LATENCY_PROFILE:-deep}
      PAPER_CHASER_GUIDED_ALLOW_PAID_PROVIDERS: ${PAPER_CHASER_GUIDED_ALLOW_PAID_PROVIDERS:-true}
      PAPER_CHASER_GUIDED_ESCALATION_ENABLED: ${PAPER_CHASER_GUIDED_ESCALATION_ENABLED:-true}
      PAPER_CHASER_GUIDED_ESCALATION_MAX_PASSES: ${PAPER_CHASER_GUIDED_ESCALATION_MAX_PASSES:-2}
      PAPER_CHASER_GUIDED_ESCALATION_ALLOW_PAID_PROVIDERS: ${PAPER_CHASER_GUIDED_ESCALATION_ALLOW_PAID_PROVIDERS:-true}
      PAPER_CHASER_TRANSPORT: ${PAPER_CHASER_TRANSPORT:-streamable-http}
      PAPER_CHASER_HTTP_PATH: ${PAPER_CHASER_HTTP_PATH:-/mcp}
      PAPER_CHASER_HTTP_AUTH_TOKEN: ${PAPER_CHASER_HTTP_AUTH_TOKEN:-}
      PAPER_CHASER_HTTP_AUTH_HEADER: ${PAPER_CHASER_HTTP_AUTH_HEADER:-authorization}
      PAPER_CHASER_ALLOWED_ORIGINS: ${PAPER_CHASER_ALLOWED_ORIGINS:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
