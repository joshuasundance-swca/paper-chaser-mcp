default_install_hook_types: [pre-commit, pre-push]
exclude: ^(build/|paper_chaser_mcp\.egg-info/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: fix-byte-order-marker
        types_or: [text]
      - id: mixed-line-ending
        args: [--fix=lf]
        types_or: [text]
      - id: end-of-file-fixer
        types_or: [text]
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        types_or: [text]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python scripts/run_mypy_precommit.py
        language: system
        pass_filenames: false
        files: ^(paper_chaser_mcp/.*\.py|tests/.*\.py|pyproject\.toml)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json
        types_or: [json]
      - id: check-toml
        types: [toml]
      - id: check-yaml
        types_or: [yaml]
      - id: check-ast
        types: [python]
      - id: debug-statements
        types: [python]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        files: ^pyproject\.toml$
        additional_dependencies:
          - validate-pyproject-schema-store[all]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-github-workflows
        files: ^\.github/workflows/.*\.(yml|yaml)$
      - id: check-dependabot
        files: ^\.github/dependabot\.ya?ml$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.(yml|yaml)$
        exclude: ^\.github/workflows/.*\.lock\.yml$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/crate-ci/typos
    rev: v1.45.0
    hooks:
      - id: typos
        types_or: [text]
        exclude: ^(\.github/workflows/test-scholar-search\.lock\.yml|infra/.*\.json|docs/pr-prep/.*\.(diff|txt)|tests/fixtures/characterization/.*\.jsonl)$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        types_or: [shell]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: [".[toml]"]

  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.513
    hooks:
      - id: checkov
        name: checkov (bicep)
        args:
          - --file
          - infra/main.bicep
          - --framework
          - bicep
          - --skip-path
          - infra/modules/roleAssignments.bicep
          - --skip-check
          # Azure image quarantine is still intentionally handled outside
          # infrastructure because the registry policy alone is not a complete
          # promotion workflow.
          - CKV_AZURE_166
        pass_filenames: false
        files: ^infra/.*\.(bicep|bicepparam)$

  - repo: local
    hooks:
      # The stock hadolint docker_image hook can wedge under Docker Desktop on
      # Windows. Use a pinned image plus an explicit timeout/cleanup wrapper so
      # the hook stays enforced without hanging the whole pre-commit run.
      - id: hadolint-docker
        name: hadolint (docker, pinned)
        entry: python scripts/run_hadolint.py
        language: system
        files: ^Dockerfile$

      - id: pip-check
        name: pip check
        entry: python -m pip check
        language: python
        additional_dependencies:
          - anyio>=4.0.0
          - defusedxml>=0.7.1
          - fastmcp>=3.1.0
          - httpx>=0.25.0
          - mcp>=1.24.0
          - pydantic>=2.11.0
          - pytest>=8.3.0
          - pytest-asyncio>=0.24.0
          - pytest-cov>=7.0.0
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]

      - id: pytest-coverage
        name: pytest coverage
        entry: python -m pytest --cov=paper_chaser_mcp --cov-report=term-missing --cov-fail-under=85
        language: python
        additional_dependencies:
          - anyio>=4.0.0
          - defusedxml>=0.7.1
          - fastmcp>=3.1.0
          - httpx>=0.25.0
          - mcp>=1.24.0
          - pydantic>=2.11.0
          - pytest>=8.3.0
          - pytest-asyncio>=0.24.0
          - pytest-cov>=7.0.0
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]

      - id: build-package
        name: build package
        entry: python -m build
        language: python
        additional_dependencies:
          - build>=1.4.0
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]

      - id: pip-audit
        name: pip audit
        entry: python -m pip_audit . --progress-spinner off --ignore-vuln CVE-2026-4539
        language: python
        additional_dependencies:
          - pip-audit>=2.10.0
        pass_filenames: false
        always_run: true
        stages: [pre-push, manual]

      - id: validate-azure-security-baseline
        name: validate azure security baseline
        entry: python scripts/validate_psrule_azure.py
        language: system
        pass_filenames: false
        files: ^(infra/.*\.(bicep|bicepparam)|ps-rule\.yaml|scripts/validate_psrule_azure\.py)$

      - id: validate-azure-deployment-assets
        name: validate azure deployment assets
        entry: python scripts/validate_deployment.py --skip-docker
        language: system
        pass_filenames: false
        files: ^(infra/.*\.(bicep|bicepparam)|infra/policies/.*\.xml|\.github/workflows/deploy-azure\.yml|Dockerfile|paper_chaser_mcp/deployment\.py|docs/azure-(architecture|deployment|security-model)\.md|scripts/validate_deployment\.py)$
