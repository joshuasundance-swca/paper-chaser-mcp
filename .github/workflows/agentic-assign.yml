name: Agentic Assign

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_run:
    workflows: ["Test Scholar Search MCP"]
    types: [completed]

permissions:
  issues: write
  contents: read

jobs:
  assign:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'agentic') &&
       contains(github.event.issue.labels.*.name, 'needs-copilot') &&
       !contains(github.event.issue.labels.*.name, 'needs-human') &&
       !contains(github.event.issue.labels.*.name, 'blocked') &&
       !contains(github.event.issue.labels.*.name, 'no-agent')) ||
      github.event_name == 'workflow_run'
    steps:
      - name: Assign Copilot to matching issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.COPILOT_GITHUB_TOKEN || github.token }}
          script: |
            const requiredLabels = new Set(['agentic', 'needs-copilot']);
            const excludedLabels = new Set(['needs-human', 'blocked', 'no-agent']);
            const copilotAssignee = 'copilot-swe-agent[bot]';
            const targetRepo = `${context.repo.owner}/${context.repo.repo}`;
            const baseBranch = context.payload.repository?.default_branch || 'master';

            const hasLabelsForAssignment = (issue) => {
              const labels = new Set(
                issue.labels.map((label) =>
                  typeof label === 'string' ? label : label.name
                )
              );
              return (
                Array.from(requiredLabels).every((label) => labels.has(label)) &&
                !Array.from(excludedLabels).some((label) => labels.has(label))
              );
            };

            const assignIfNeeded = async (issue) => {
              if (!hasLabelsForAssignment(issue)) {
                core.info(`Issue #${issue.number} does not match assignment labels. Skipping.`);
                return false;
              }

              const assignees = issue.assignees.map((assignee) => assignee.login);
              if (assignees.includes('Copilot') || assignees.includes(copilotAssignee)) {
                core.info(`Copilot is already assigned to issue #${issue.number}. Skipping.`);
                return false;
              }

              await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [copilotAssignee],
                agent_assignment: {
                  target_repo: targetRepo,
                  base_branch: baseBranch,
                  custom_instructions: '',
                  custom_agent: '',
                  model: '',
                },
                headers: {
                  accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });
              core.info(`Assigned Copilot to issue #${issue.number}`);
              return true;
            };

            if (context.eventName === 'issues') {
              await assignIfNeeded(context.payload.issue);
              return;
            }

            const workflowRun = context.payload.workflow_run;
            core.info(
              `Scanning for unassigned agentic issues after workflow run ${workflowRun.id}.`
            );

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: Array.from(requiredLabels).join(','),
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });

            let assignedCount = 0;
            for (const issue of issues) {
              if (await assignIfNeeded(issue)) {
                assignedCount += 1;
              }
            }

            core.info(
              assignedCount === 0
                ? 'No matching issues needed assignment.'
                : `Assigned Copilot to ${assignedCount} issue(s).`
            );
