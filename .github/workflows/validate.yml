name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  COVERAGE_FAIL_UNDER: '85'
  GH_AW_VERSION: v0.63.1

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install gh-aw
        if: matrix.python-version == '3.12'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin "$GH_AW_VERSION"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Verify agentic workflow lockfile is up to date
        if: matrix.python-version == '3.12'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh aw compile test-paper-chaser --dir .github/workflows
          pre-commit run --files .github/workflows/test-paper-chaser.lock.yml || true
          pre-commit run --files .github/workflows/test-paper-chaser.lock.yml
          git diff --exit-code -- .github/workflows/test-paper-chaser.lock.yml

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run tests
        if: matrix.python-version != '3.12'
        run: python -m pytest

      - name: Run tests with coverage gate
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest \
            --cov=paper_chaser_mcp \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${{ env.COVERAGE_FAIL_UNDER }}

      - name: Validate deployment assets
        if: matrix.python-version == '3.12'
        run: python scripts/validate_deployment.py --skip-docker

      - name: Build package
        if: matrix.python-version == '3.12'
        run: python -m build

      - name: Audit dependencies
        if: matrix.python-version == '3.12'
        run: |
          # Temporary ignore: pip-audit flags CVE-2026-4539 for transitive
          # Pygments releases, but no fixed upstream version is published yet.
          python -m pip_audit . --progress-spinner off --ignore-vuln CVE-2026-4539

      - name: Run mypy
        run: python -m mypy --config-file pyproject.toml

      - name: Run Bandit
        run: python -m bandit -c pyproject.toml -r paper_chaser_mcp
