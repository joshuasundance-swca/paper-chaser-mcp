name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GH_AW_VERSION: v0.59.0

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install gh-aw
        if: matrix.python-version == '3.12'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin $GH_AW_VERSION

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Verify agentic workflow lockfile is up to date
        if: matrix.python-version == '3.12'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh aw compile test-scholar-search --dir .github/workflows
          pre-commit run --files .github/workflows/test-scholar-search.lock.yml || true
          pre-commit run --files .github/workflows/test-scholar-search.lock.yml
          git diff --exit-code -- .github/workflows/test-scholar-search.lock.yml

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run tests
        run: python -m pytest

      - name: Run mypy
        run: python -m mypy --config-file pyproject.toml

      - name: Run Bandit
        run: python -m bandit -c pyproject.toml -r scholar_search_mcp
